global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    cluster: 'demo-cluster'
    environment: 'dev'

scrape_configs:
  # Scrape the OpenTelemetry Collector (use host so Prometheus in Docker can reach collector's mapped ports)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['host.docker.internal:8889']  # App metrics from OTel
      - targets: ['host.docker.internal:8888']  # Collector telemetry (optional)
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
